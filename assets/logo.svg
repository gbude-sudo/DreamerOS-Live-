<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rgbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="20%" stop-color="#8b5cf6"/>
      <stop offset="40%" stop-color="#ec4899"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="80%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle glow -->
  <circle cx="16" cy="16" r="14" fill="url(#rgbGrad)" opacity="0.1"/>
  <!-- Fingerprint ridges -->
  <path d="M16 4c0 8-6 12-6 20" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M16 4c0 6-4 10-4 16" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M16 6c0 4-2 8-2 12" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M16 4c0 8 6 12 6 20" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M16 4c0 6 4 10 4 16" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M16 6c0 4 2 8 2 12" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- Center spiral -->
  <ellipse cx="16" cy="14" rx="4" ry="6" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="16" cy="14" rx="2" ry="3" stroke="url(#rgbGrad)" stroke-width="1.5" fill="none" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="16" cy="13" r="1.5" fill="url(#rgbGrad)" filter="url(#glow)"/>
</svg>
